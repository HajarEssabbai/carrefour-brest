{% extends "base_client.html" %} 
{% block content %}
<div class="loading-page" id="loadingPage">

    <img
    src="{{ url_for('static', filename='hermine_AI.png') }}"
    class="hermine"
    id="hermine"
    >

    <p class="loading-text">
    Localisation de votre produit…
    </p>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const hermine = document.getElementById("hermine");
    const loadingPage = document.getElementById("loadingPage");

    setTimeout(function(){

        hermine.classList.add("spin");
        loadingPage.classList.add("fade-out");

        setTimeout(function(){
            window.location.replace("{{ url_plan }}");
        }, 800);

    }, 2200);

});
</script>

 {% endblock %}
