<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Connexion Admin</title>

<link rel="stylesheet"
href="{{ url_for('static',
filename='style.css') }}">

</head>

<body class="login-page">


<div class="login-box">

<h2>
Espace administrateur
</h2>

<form method="POST">

<input
type="text"
name="username"
placeholder="Nom utilisateur"
required
>

<input
type="password"
name="password"
placeholder="Mot de passe"
required
>

<button type="submit">
Se connecter
</button>

</form>

</div>


</body>
</html>
